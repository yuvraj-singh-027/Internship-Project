<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yuvraj Internship Project</title>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>My Internship Project</h1>
    <h2>Front-End Development Tasks</h2>
  </header>

  <!-- About Section -->
  <section id="about">
    <h3>About</h3>
    <p>
      This project is part of my internship involving HTML, CSS, and JavaScript
      to build a responsive and interactive website.
    </p>
  </section>

  <!-- Sample Image -->
  <section id="image">
    <h3>Sample Image</h3>
    <img src="image.jpg" alt="Sample Project Image">
  </section>

  <!-- Interactive Button -->
  <section id="button">
    <h3>Interactive Button</h3>
    <button onclick="changeColor()">Click Me</button>
  </section>

  <!-- API Data -->
  <section id="api">
    <h3>API Data</h3>
    <div id="apiData">Loading...</div>
  </section>

  <!-- Contact Form -->
  <section id="contact">
    <h3>Contact Form</h3>
    <form id="myForm">
      <label>Name:</label><br>
      <input type="text" id="name" placeholder="Enter your name"><br>

      <label>Email:</label><br>
      <input type="email" id="email" placeholder="Enter your email"><br>

      <button type="submit">Submit</button>
    </form>
    <p id="message"></p>
  </section>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
